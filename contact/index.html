<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Santa Cruz Fruit</title>
    <meta
      name="description"
      content="Contact Santa Cruz Fruit to discuss orchard design, grafting workshops, and fruit tree consulting."
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="../index.html">Santa Cruz Fruit</a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../about/">About</a>
          <a href="../blog/">Blog</a>
          <a href="../contact/">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-intro">
        <div class="container">
          <h1>Contact</h1>
          <p class="lead">
            Send a quick note and I will follow up.
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <form
            class="form"
            id="contact-form"
            method="POST"
          >
            <input type="hidden" name="_subject" value="Santa Cruz Fruit inquiry" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_captcha" value="false" />
            <input
              type="text"
              name="_honey"
              class="sr-only"
              tabindex="-1"
              autocomplete="off"
            />
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required />
            </div>

            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>

            <div>
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                placeholder="Tell me a bit about your project."
                required
              ></textarea>
            </div>

            <button class="button" id="contact-submit" type="submit">Send Message</button>
          </form>
          <p class="note" id="contact-note" aria-live="polite">
            Send your inquiry directly from this page.
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-sitemap">
          <nav>
            <a href="../index.html">Home</a>
            <a href="../about/">About</a>
            <a href="../blog/">Blog</a>
            <a href="../contact/">Contact</a>
          </nav>
        </div>
      </div>
    </footer>
    <script src="../scripts/contact.js"></script>
  </body>
</html>
